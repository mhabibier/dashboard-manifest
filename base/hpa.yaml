# HorizontalPodAutoscaler for Dashboard (Admin Dashboard)

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dashboard-hpa
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dashboard
  minReplicas: 2    # Selalu pertahankan minimal 2 pod untuk ketersediaan tinggi
  maxReplicas: 6    # Admin dashboard biasanya traffic lebih rendah dari user-facing
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up saat CPU > 70% rata-rata antar pod
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Scale up saat memory > 80% rata-rata antar pod
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30     # Respons terhadap lonjakan traffic dalam 30s
      policies:
        - type: Pods
          value: 2               # Tambah maksimal 2 pod per event scale-up
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300    # Tunggu 5 menit sebelum scale-down (cegah flapping)
      policies:
        - type: Pods
          value: 1               # Kurangi maksimal 1 pod per event scale-down
          periodSeconds: 60
