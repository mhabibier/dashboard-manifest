# Deployment for Dashboard (Admin Dashboard)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: server
    app.kubernetes.io/version:   "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1   # Spin up 1 extra pod sebelum mematikan yang lama
      maxUnavailable: 0   # Zero downtime — jangan matikan pod sebelum penggantinya siap
  template:
    metadata:
      labels:
        app: dashboard
        app.kubernetes.io/name:      dashboard
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: dashboard-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser:  101   # UID nginx dalam image nginx:alpine
        runAsGroup: 101
        fsGroup:    101
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: harbor-secret   # docker-registry secret dibuat terpisah oleh admin/pipeline
      containers:
        - name: dashboard
          image: harbor.sxdentrypoint.my.id/devsecops/dashboard-app:v1
          imagePullPolicy: Always
          ports:
            - name:          http
              containerPort: 80
              protocol:      TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false  # nginx perlu write ke /var/cache/nginx dan /var/run
            runAsNonRoot:             true
            runAsUser:                101    # nginx user dalam nginx:alpine
            capabilities:
              drop: ["ALL"]
              add:  ["NET_BIND_SERVICE"]
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds:       5
            failureThreshold:    6     # 6 × 5s = 30s max startup time
            timeoutSeconds:      3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds:       20
            timeoutSeconds:      5
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 0
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3
            successThreshold:    1
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"
          volumeMounts:
            - name:      nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath:   nginx.conf   # Ambil key nginx.conf dari ConfigMap
              readOnly:  true
            - name:      nginx-cache
              mountPath: /var/cache/nginx   # nginx butuh writable cache dir
            - name:      nginx-pid
              mountPath: /var/run           # nginx butuh writable /var/run untuk PID file
            - name:      tmp
              mountPath: /tmp
      volumes:
        - name: nginx-config
          configMap:
            name: dashboard-config   # ConfigMap berisi key nginx.conf
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-pid
          emptyDir: {}
        - name: tmp
          emptyDir: {}
