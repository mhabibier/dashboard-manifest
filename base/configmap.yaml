# ConfigMap for Dashboard (Admin Dashboard)

apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: config
data:
  VITE_AUTH_API_URL:       "http://auth-service.auth-service.svc.cluster.local"
  VITE_BOOK_API_URL:       "http://book-service.book-service.svc.cluster.local"
  VITE_ORDER_API_URL:      "http://order-service.order-service.svc.cluster.local"
  VITE_PAYMENT_API_URL:    "http://payment-service.payment-service.svc.cluster.local"
  VITE_BLOCKCHAIN_API_URL: "http://blockchain-service.blockchain-service.svc.cluster.local"

  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10m;
        server_tokens off;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Proxy API calls ke backend services
        location /api/auth {
            proxy_pass         http://auth-service.auth-service.svc.cluster.local;
            rewrite ^/api/auth(/.*)? /auth$1 break;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  X-Frame-Options;
            proxy_hide_header  Cross-Origin-Embedder-Policy;
            proxy_hide_header  Cross-Origin-Opener-Policy;
            proxy_hide_header  Cross-Origin-Resource-Policy;
            proxy_hide_header  Permissions-Policy;
            proxy_hide_header  Strict-Transport-Security;
            proxy_hide_header  X-Content-Type-Options;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/books {
            proxy_pass         http://book-service.book-service.svc.cluster.local;
            rewrite ^/api/books(/.*)? /books$1 break;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  X-Frame-Options;
            proxy_hide_header  Cross-Origin-Embedder-Policy;
            proxy_hide_header  Cross-Origin-Opener-Policy;
            proxy_hide_header  Cross-Origin-Resource-Policy;
            proxy_hide_header  Permissions-Policy;
            proxy_hide_header  Strict-Transport-Security;
            proxy_hide_header  X-Content-Type-Options;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/orders {
            proxy_pass         http://order-service.order-service.svc.cluster.local;
            rewrite ^/api/orders(/.*)? /orders$1 break;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  X-Frame-Options;
            proxy_hide_header  Cross-Origin-Embedder-Policy;
            proxy_hide_header  Cross-Origin-Opener-Policy;
            proxy_hide_header  Cross-Origin-Resource-Policy;
            proxy_hide_header  Permissions-Policy;
            proxy_hide_header  Strict-Transport-Security;
            proxy_hide_header  X-Content-Type-Options;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/payments {
            proxy_pass         http://payment-service.payment-service.svc.cluster.local;
            rewrite ^/api/payments(/.*)? /payments$1 break;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  X-Frame-Options;
            proxy_hide_header  Cross-Origin-Embedder-Policy;
            proxy_hide_header  Cross-Origin-Opener-Policy;
            proxy_hide_header  Cross-Origin-Resource-Policy;
            proxy_hide_header  Permissions-Policy;
            proxy_hide_header  Strict-Transport-Security;
            proxy_hide_header  X-Content-Type-Options;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/blockchain {
            proxy_pass         http://blockchain-service.blockchain-service.svc.cluster.local:3000;
            rewrite ^/api/blockchain(/.*)? /blockchain$1 break;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_hide_header  Content-Security-Policy;
            proxy_hide_header  X-Frame-Options;
            proxy_hide_header  Cross-Origin-Embedder-Policy;
            proxy_hide_header  Cross-Origin-Opener-Policy;
            proxy_hide_header  Cross-Origin-Resource-Policy;
            proxy_hide_header  Permissions-Policy;
            proxy_hide_header  Strict-Transport-Security;
            proxy_hide_header  X-Content-Type-Options;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://s3-api.sxdentrypoint.my.id; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
            add_header X-Frame-Options "DENY" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
