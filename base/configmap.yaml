# ConfigMap for Dashboard (Admin Dashboard)

apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: config
data:
  VITE_AUTH_API_URL:       "http://auth-service.auth-service.svc.cluster.local"
  VITE_BOOK_API_URL:       "http://book-service.book-service.svc.cluster.local"
  VITE_ORDER_API_URL:      "http://order-service.order-service.svc.cluster.local"
  VITE_PAYMENT_API_URL:    "http://payment-service.payment-service.svc.cluster.local"
  VITE_BLOCKCHAIN_API_URL: "http://blockchain-service.blockchain-service.svc.cluster.local"

  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        # Gunakan CoreDNS Kubernetes sebagai resolver agar Nginx bisa resolve dinamis
        resolver 10.96.0.10 valid=10s ipv6=off;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls ke backend services menggunakan variabel 
        # untuk mencegah Nginx crash saat startup jika service belum ada (host not found)
        
        location /api/auth/ {
            set $auth_backend http://auth-service.auth-service.svc.cluster.local;
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass         $auth_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/books/ {
            set $book_backend http://book-service.book-service.svc.cluster.local;
            rewrite ^/api/books/(.*) /$1 break;
            proxy_pass         $book_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/orders/ {
            set $order_backend http://order-service.order-service.svc.cluster.local;
            rewrite ^/api/orders/(.*) /$1 break;
            proxy_pass         $order_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/payments/ {
            set $payment_backend http://payment-service.payment-service.svc.cluster.local;
            rewrite ^/api/payments/(.*) /$1 break;
            proxy_pass         $payment_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/blockchain/ {
            set $blockchain_backend http://blockchain-service.blockchain-service.svc.cluster.local;
            rewrite ^/api/blockchain/(.*) /$1 break;
            proxy_pass         $blockchain_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
