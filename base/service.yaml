# Service for Dashboard (Admin Dashboard)

apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app: dashboard   # Harus cocok dengan pod template labels di Deployment
  ports:
    - name:       http
      port:       80          # Port yang digunakan cluster internal
      targetPort: http        # Named port pada pod (containerPort: 80)
      protocol:   TCP

---

# NodePort Service (opsional, digunakan untuk akses langsung tanpa Ingress)
# Uncomment jika diperlukan:

apiVersion: v1
kind: Service
metadata:
  name: dashboard-np
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: server-nodeport
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - name:       http
      port:       80
      targetPort: http
      protocol:   TCP
      nodePort:   30081
