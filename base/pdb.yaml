# PodDisruptionBudget for Dashboard (Admin Dashboard)

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard-pdb
  namespace: dashboard
  labels:
    app.kubernetes.io/name:      dashboard
    app.kubernetes.io/component: pdb
spec:
  minAvailable: 1   # Minimal 1 pod harus tetap berjalan saat ada gangguan (drain node, rolling update)
  selector:
    matchLabels:
      app: dashboard
